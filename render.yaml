services:
  - type: web
    name: pra-connector-backend
    runtime: node
    plan: free
    buildCommand: npm run build && npx prisma migrate deploy
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: FRONTEND_URL
        value: https://pra-connector-frontend.vercel.app
      - key: QBO_REDIRECT_URI
        value: https://pra-connector-backend.onrender.com/api/qbo/callback
      # Development keys from Intuit → sandbox. Production keys → production.
      - key: QBO_ENVIRONMENT
        value: sandbox
